<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admission Form</title>
    <link rel="stylesheet" href="./style.css">
</head>
<body>
    <h1>Admission Form</h1>
    <div class="form-container">
        <div class="form-header">
            <h2>University Institute Of Engineering And Technology</h2>
            <h2>University Of Jammu</h2>
        </div>
        <form id="studentForm" enctype="multipart/form-data">
            <div class="form-group">
                <label>Student Name:</label>
                <input type="text" name="Full Name" required>
            </div>

            <div class="form-group">
                <label>Father's Name:</label>
                <input type="text" name="Father Name" required>
            </div>

            <div class="form-group">
                <label>Mother's Name:</label>
                <input type="text" name="Mother Name" required>
            </div>

            <div class="form-group">
                <label>Email Address:</label>
                <input type="email" name="Email Address" required>
            </div>

            <div class="form-group">
                <label>Phone Number:</label>
                <input type="tel" name="Phone Number" required pattern="[0-9]{10}" title="Enter a 10-digit phone number">
            </div>

            <div class="form-group">
                <label>Payment Receipt:</label>
                <input type="file" name="PaymentReceipt" accept="image/*,application/pdf" required>
            </div>

            <div class="submit-button">
                <button id="submitButton" type="button" onclick="submitForm()">Submit</button>
            </div>
        </form>
    </div>

    <script>
        function submitForm() {
            if (!validateForm()) return;

            // Open the external loader
            const loaderWindow = window.open("./loader.html", "_blank", "width=300,height=200");

            const form = document.getElementById('studentForm');
            const submitButton = document.getElementById('submitButton');
            submitButton.disabled = true;
            submitButton.textContent = "Submitting...";

            const formData = new FormData(form);

            fetch('https://script.google.com/macros/s/AKfycbz98OMzTVYs9_dsxj6F3Z2yf-SMM3iVr55DuCxH8Y1IV1wiXgnQiHAvD2Rf6_bBw_3JIw/exec', {
                method: 'POST',
                body: formData
            })
            .then(response => response.json())
            .then(data => {
                if (data.result === 'success') {
                    submitButton.textContent = "Form Submitted Successfully!";
                    alert("Form submitted successfully!");
                    setTimeout(() => {
                        submitButton.textContent = "Submit";
                        submitButton.disabled = false;
                        form.reset();
                        loaderWindow.close(); // Close loader window
                    }, 2000);
                } else {
                    alert('Error: ' + data.error);
                    submitButton.textContent = "Submit";
                    submitButton.disabled = false;
                    loaderWindow.close(); // Close loader window
                }
            })
            .catch(error => {
                console.error('Error:', error);
                alert('Submission failed. Please try again.');
                submitButton.textContent = "Submit";
                submitButton.disabled = false;
                loaderWindow.close(); // Close loader window
            });
        }

        function validateForm() {
            const form = document.getElementById('studentForm');
            const inputs = form.querySelectorAll("input[required], select[required]");
            
            for (let input of inputs) {
                if (!input.value.trim()) {
                    alert(`Please fill in the required field: ${input.name}`);
                    input.focus();
                    return false;
                }
            }
            return true;
        }
    </script>
</body>
</html>




<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admission Form - University Institute of Engineering and Technology</title>
    <link rel="stylesheet" href="./style.css">
</head>
<body>
    <h1>Admission Form</h1>
    <div class="form-container">
        <div class="form-header">
            <h2>University Institute Of Engineering And Technology</h2>
            <h2>University Of Jammu</h2>
        </div>
        <form id="studentForm" enctype="multipart/form-data">
            <div class="form-group">
                <label>Student Name:</label>
                <input type="text" name="Full Name" required>
            </div>

            <div class="form-group">
                <label>Father's Name:</label>
                <input type="text" name="Father Name" required>
            </div>

            <div class="form-group">
                <label>Mother's Name:</label>
                <input type="text" name="Mother Name" required>
            </div>
            
            <div class="form-group">
                <label>Email Address:</label>
                <input type="email" name="Email Address" required>
            </div>

            <div class="form-group">
                <label>Phone Number:</label>
                <input type="tel" name="Phone Number" required pattern="[0-9]{10}" title="Enter a 10-digit phone number">
            </div>

            <div class="form-group">
                <label for="address">Residential Address:</label>
                <input type="text" id="address" name="Address" required>
            </div>

            <div class="form-group">
                <label for="course">Course Applied For:</label>
                <select id="course" name="Course Applied" required>
                    <option value="">Select Course</option>
                    <option value="B.Tech">B.Tech</option>
                </select>
                <br><br>
                <label for="branch">Select a branch:</label>
                <select id="branch" name="Selected Branch" required>
                    <option value="">Select a Branch</option>
                    <option value="cse">Computer Science And Engineering</option>
                    <option value="civil">Civil Engineering</option>
                </select>
            </div>

            <u><h3>Academic Details</h3></u>

            <div class="form-group">
                <label for="marks10">10th Marks (%):</label>
                <input type="number" id="marks10" name="10th Marks" required min="0" max="100">
            </div>

            <div class="form-group">
                <label for="marks12">12th Marks (%):</label>
                <input type="number" id="marks12" name="12th Marks" required min="0" max="100">
            </div>

            <div class="form-group">
                <label for="jee-score">JEE Main Score:</label>
                <input type="number" id="jee-score" name="JEE Main Score" min="0">
            </div>

            <div class="form-group">
                <label for="cuet-score">CUET (UG) Score:</label>
                <input type="number" id="cuet-score" name="CUET Score" min="0">
            </div>

            <u><h3>Additional Details</h3></u>

            <div class="form-group">
                <label for="category">Category:</label>
                <select id="category" name="Category" required>
                    <option value="">Select Category</option>
                    <option value="general">General</option>
                    <option value="sc">SC</option>
                    <option value="st">ST</option>
                    <option value="obc">OBC</option>
                    <option value="ews">EWS</option>
                </select>
            </div>

            <div class="form-group">
                <label>Payment Receipt:</label>
                <input type="file" name="PaymentReceipt" accept="image/*,application/pdf" required>
            
                <label>Student Photo:</label>
                <input type="file" name="StudentPhoto" accept="image/*" required>
            </div>

            <div class="submit-button">
                <button id="submitButton" type="button" onclick="submitForm()">Submit</button>
            </div>
        </form>
    </div>

    <script>
        function validateForm() {
            const form = document.getElementById('studentForm');
            const inputs = form.querySelectorAll("input[required], select[required]");
            
            for (let input of inputs) {
                if (!input.value.trim()) {
                    alert(`Please fill in the required field: ${input.name}`);
                    input.focus();
                    return false;
                }
            }
            return true;
        }

        function submitForm() {
            if (!validateForm()) return;

            const form = document.getElementById('studentForm');
            const submitButton = document.getElementById('submitButton');
            submitButton.disabled = true;
            submitButton.textContent = "Submitting...";

            const formData = new FormData(form);
            const fileFields = ['PaymentReceipt', 'StudentPhoto'];
            const filePromises = [];

            fileFields.forEach(field => {
                const fileInput = document.querySelector(`input[name="${field}"]`);
                if (fileInput.files.length > 0) {
                    const file = fileInput.files[0];
                    const reader = new FileReader();
                    
                    const filePromise = new Promise(resolve => {
                        reader.onloadend = function () {
                            formData.append(field, reader.result.split(',')[1]);
                            formData.append(`${field}MimeType`, file.type);
                            formData.append(`${field}Name`, file.name);
                            resolve();
                        };
                        reader.readAsDataURL(file);
                    });

                    filePromises.push(filePromise);
                }
            });

            Promise.all(filePromises).then(() => {
                fetch('https://script.google.com/macros/s/AKfycbz98OMzTVYs9_dsxj6F3Z2yf-SMM3iVr55DuCxH8Y1IV1wiXgnQiHAvD2Rf6_bBw_3JIw/exec', {
                    method: 'POST',
                    body: formData
                })
                .then(response => response.json())
                .then(data => {
                    if (data.result === 'success') {
                        submitButton.textContent = "Form Submitted Successfully!";
                        setTimeout(() => {
                            submitButton.textContent = "Submit";
                            submitButton.disabled = false;
                            form.reset();
                        }, 3000);
                    } else {
                        alert('Error: ' + data.error);
                        submitButton.textContent = "Submit";
                        submitButton.disabled = false;
                    }
                })
                .catch(error => {
                    console.error('Error:', error);
                    alert('Submission failed. Please try again.');
                    submitButton.textContent = "Submit";
                    submitButton.disabled = false;
                });
            });
        }
    </script>
</body>
</html>
